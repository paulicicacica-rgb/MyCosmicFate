<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cosmic Fate Reading — MyCosmicFate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05071a;--purple:#8b45ff;--purple-soft:#b891ff;--gold:#c9a84c;--cream:#f0eaff;--muted:rgba(200,180,255,0.45)}
body{background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',serif;min-height:100vh;}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Loading */
#loading{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:24px}
.orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#9b6dff,#4a1a8a 50%,#0d0520 80%);box-shadow:0 0 60px rgba(155,109,255,0.5);display:flex;align-items:center;justify-content:center;font-size:1.8rem;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(155,109,255,0.5)}50%{box-shadow:0 0 110px rgba(155,109,255,0.9)}}
.loading-title{font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:2px}
.loading-sub{font-style:italic;color:var(--muted);font-size:0.95rem;max-width:300px;line-height:1.7}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--purple-soft);margin:0 3px;opacity:0.3;animation:dot 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Report */
#report{display:none;position:relative;z-index:1;max-width:760px;margin:0 auto;padding:60px 24px 120px}

/* Download button */
.download-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:linear-gradient(0deg,rgba(5,7,26,0.98) 60%,transparent);padding:20px 24px 32px;text-align:center}
.btn-download{background:linear-gradient(135deg,var(--purple),#5a1fb5);color:#fff;border:none;padding:14px 40px;border-radius:50px;font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 30px rgba(139,69,255,0.4)}

/* Cover */
.cover{text-align:center;padding:60px 0 80px;border-bottom:1px solid rgba(184,145,255,0.1);margin-bottom:70px}
.cover-logo{font-family:'Cinzel',serif;font-size:0.65rem;color:rgba(184,145,255,0.25);letter-spacing:6px;margin-bottom:40px}
.cover-orb{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#9b6dff,#4a1a8a 50%,#0d0520 80%);box-shadow:0 0 80px rgba(155,109,255,0.4);margin:0 auto 36px;display:flex;align-items:center;justify-content:center;font-size:2.2rem}
.cover-title{font-family:'Cinzel',serif;font-size:clamp(1.6rem,5vw,2.4rem);color:var(--cream);margin-bottom:12px;font-weight:400;letter-spacing:1px}
.cover-sub{font-style:italic;color:var(--muted);font-size:1.05rem;line-height:1.8;max-width:400px;margin:0 auto 40px}
.cover-date{font-family:'Inter',sans-serif;font-size:0.65rem;color:rgba(184,145,255,0.2);letter-spacing:4px}

/* Planet diagram */
.planet-diagram{margin:48px 0;text-align:center}
.planet-diagram svg{max-width:100%;height:auto}
.diagram-caption{font-style:italic;color:var(--muted);font-size:0.8rem;margin-top:12px;letter-spacing:1px}

/* Sections */
.section{margin-bottom:70px;page-break-inside:avoid}
.section-number{font-family:'Cinzel',serif;font-size:0.55rem;color:var(--gold);letter-spacing:6px;opacity:0.6;margin-bottom:10px}
.section-title{font-family:'Cinzel',serif;font-size:clamp(1.1rem,3vw,1.5rem);color:var(--cream);margin-bottom:8px;font-weight:400;letter-spacing:1px}
.section-rule{height:1px;background:linear-gradient(90deg,var(--gold),transparent);width:60px;margin-bottom:28px;opacity:0.4}
.section-body{font-size:1.05rem;line-height:2;color:rgba(220,210,245,0.78);font-weight:300}
.section-body p{margin-bottom:20px}
.section-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(184,145,255,0.12),transparent);margin:70px 0}

/* Highlight box */
.highlight-box{background:rgba(139,69,255,0.06);border:1px solid rgba(184,145,255,0.12);border-radius:16px;padding:28px 32px;margin:32px 0}
.highlight-box p{margin:0;font-style:italic;font-size:1.1rem;color:var(--purple-soft);line-height:1.9}

/* Closing */
.closing{text-align:center;padding:60px 0;border-top:1px solid rgba(184,145,255,0.08);margin-top:60px}
.closing-line{font-style:italic;font-size:1.2rem;color:var(--purple-soft);line-height:1.9;max-width:480px;margin:0 auto 24px}
.closing-logo{font-family:'Cinzel',serif;font-size:0.6rem;color:rgba(184,145,255,0.2);letter-spacing:5px}

/* Print styles */
@media print{
  body{background:#05071a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #starfield,#loading,.download-bar{display:none!important}
  #report{display:block!important;padding:20px}
  .section{page-break-inside:avoid}
  .cover{page-break-after:always}
  .planet-diagram{page-break-inside:avoid}
}
</style>

<body>
<canvas id="starfield"></canvas>

<div id="loading">
  <div class="orb">✦</div>
  <div class="loading-title">Loading your reading</div>
  <div class="loading-sub">The stars are aligning your report</div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<div id="report"></div>

<div class="download-bar" id="download-bar" style="display:none">
  <button class="btn-download" onclick="downloadPDF()">⬇ Download as PDF</button>
</div>

<script>
// Stars
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
function initStars(){stars=[];for(let i=0;i<140;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.1,phase:Math.random()*Math.PI*2,speed:0.002+Math.random()*0.003})}
function drawStars(){ctx.clearRect(0,0,canvas.width,canvas.height);const t=Date.now()*0.001;stars.forEach(s=>{const a=(Math.sin(s.phase+t*s.speed*10)+1)/2*0.6+0.05;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,175,255,${a})`;ctx.fill()});requestAnimationFrame(drawStars)}
resizeCanvas();initStars();drawStars();
window.addEventListener('resize',()=>{resizeCanvas();initStars()});

function downloadPDF() {
  document.getElementById('download-bar').style.display = 'none';
  document.getElementById('starfield').style.display = 'none';
  window.print();
  setTimeout(() => {
    document.getElementById('download-bar').style.display = 'block';
    document.getElementById('starfield').style.display = 'block';
  }, 1000);
}

// Planet SVG diagrams
function birthChartSVG() {

        <stop offset="0%" stop-color="#1a0a3a" stop-opacity="1"/>
        <stop offset="100%" stop-color="#05071a" stop-opacity="1"/>
      </radialGradient>
    </defs>
    <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="rgba(184,145,255,0.12)" stroke-width="1"/>
    <!-- Outer ring -->
    <circle cx="200" cy="200" r="180" fill="none" stroke="rgba(184,145,255,0.08)" stroke-width="1"/>
    <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(184,145,255,0.06)" stroke-width="1"/>
    <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(184,145,255,0.08)" stroke-width="1"/>
    <circle cx="200" cy="200" r="60"  fill="none" stroke="rgba(201,168,76,0.15)"  stroke-width="1"/>
    <!-- Spokes -->
    <line x1="200" y1="20" x2="200" y2="380" stroke="rgba(184,145,255,0.05)" stroke-width="1"/>
    <line x1="20" y1="200" x2="380" y2="200" stroke="rgba(184,145,255,0.05)" stroke-width="1"/>

    <line x1="326" y1="74" x2="74" y2="326" stroke="rgba(184,145,255,0.05)" stroke-width="1"/>

    <text x="200" y="82" text-anchor="middle" fill="rgba(201,168,76,0.7)" font-size="9" font-family="serif" letter-spacing="1">SUN</text>

    <text x="290" y="140" text-anchor="middle" fill="rgba(184,145,255,0.7)" font-size="9" font-family="serif" letter-spacing="1">MOON</text>
    <!-- Rising -->

    <text x="110" y="140" text-anchor="middle" fill="rgba(74,158,255,0.7)" font-size="9" font-family="serif" letter-spacing="1">ASC</text>
    <!-- Saturn -->
    <circle cx="310" cy="260" r="10" fill="#8b6fff" fill-opacity="0.7"/>
    <text x="310" y="246" text-anchor="middle" fill="rgba(139,111,255,0.7)" font-size="9" font-family="serif" letter-spacing="1">♄</text>
    <!-- Jupiter -->
    <circle cx="90" cy="260" r="12" fill="#e8a840" fill-opacity="0.7"/>
    <text x="90" y="246" text-anchor="middle" fill="rgba(232,168,64,0.7)" font-size="9" font-family="serif" letter-spacing="1">♃</text>
    <!-- Venus -->
    <circle cx="160" cy="310" r="9" fill="#ff91b8" fill-opacity="0.7"/>
    <text x="160" y="296" text-anchor="middle" fill="rgba(255,145,184,0.7)" font-size="9" font-family="serif" letter-spacing="1">♀</text>
    <!-- Mars -->
    <circle cx="240" cy="310" r="9" fill="#ff6b6b" fill-opacity="0.7"/>
    <text x="240" y="296" text-anchor="middle" fill="rgba(255,107,107,0.7)" font-size="9" font-family="serif" letter-spacing="1">♂</text>
    <!-- Centre -->
    <circle cx="200" cy="200" r="4" fill="rgba(184,145,255,0.5)"/>
    <!-- Zodiac labels outer ring -->
    <text x="200" y="16" text-anchor="middle" fill="rgba(184,145,255,0.2)" font-size="8" font-family="serif">♈</text>
    <text x="384" y="204" text-anchor="middle" fill="rgba(184,145,255,0.2)" font-size="8" font-family="serif">♋</text>
    <text x="200" y="396" text-anchor="middle" fill="rgba(184,145,255,0.2)" font-size="8" font-family="serif">♎</text>
    <text x="16" y="204" text-anchor="middle" fill="rgba(184,145,255,0.2)" font-size="8" font-family="serif">♑</text>
  </svg>`;
}

function saturnSVG() {
  return `<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg" style="max-width:320px">
    <defs>
      <radialGradient id="saturn-g" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#05071a" stop-opacity="1"/>
      </radialGradient>
    </defs>
    <rect width="360" height="200" fill="#05071a"/>
    <!-- Saturn planet -->
    <ellipse cx="180" cy="100" rx="55" ry="55" fill="url(#saturn-g)" stroke="rgba(201,168,76,0.2)" stroke-width="1"/>
    <ellipse cx="180" cy="100" rx="45" ry="45" fill="#1a1030" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>
    <!-- Saturn rings -->
    <ellipse cx="180" cy="100" rx="95" ry="22" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="8"/>
    <ellipse cx="180" cy="100" rx="95" ry="22" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="14"/>
    <!-- Glyph -->
    <text x="180" y="107" text-anchor="middle" fill="rgba(201,168,76,0.6)" font-size="28" font-family="serif">♄</text>

    <text x="180" y="170" text-anchor="middle" fill="rgba(201,168,76,0.35)" font-size="9" font-family="serif" letter-spacing="4">SATURN · THE TEACHER</text>
    <!-- Stars -->
    <text x="30" y="40" fill="rgba(184,145,255,0.3)" font-size="6">✦</text>
    <text x="310" y="60" fill="rgba(184,145,255,0.2)" font-size="5">✦</text>
    <text x="50" y="160" fill="rgba(184,145,255,0.2)" font-size="4">✦</text>
    <text x="290" y="150" fill="rgba(184,145,255,0.3)" font-size="6">✦</text>
  </svg>`;
}

function jupiterSVG() {
  return `<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg" style="max-width:320px">
    <defs>
      <radialGradient id="jup-g" cx="40%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#e8a840" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#05071a" stop-opacity="1"/>
      </radialGradient>
    </defs>
    <rect width="360" height="200" fill="#05071a"/>
    <ellipse cx="180" cy="100" rx="60" ry="60" fill="url(#jup-g)" stroke="rgba(232,168,64,0.15)" stroke-width="1"/>
    <!-- Storm bands -->
    <ellipse cx="180" cy="85" rx="55" ry="8" fill="none" stroke="rgba(232,168,64,0.1)" stroke-width="5"/>
    <ellipse cx="180" cy="100" rx="58" ry="6" fill="none" stroke="rgba(232,168,64,0.08)" stroke-width="4"/>
    <ellipse cx="180" cy="115" rx="54" ry="7" fill="none" stroke="rgba(232,168,64,0.1)" stroke-width="4"/>
    <text x="180" y="108" text-anchor="middle" fill="rgba(232,168,64,0.55)" font-size="30" font-family="serif">♃</text>
    <text x="180" y="170" text-anchor="middle" fill="rgba(232,168,64,0.3)" font-size="9" font-family="serif" letter-spacing="4">JUPITER · THE OPENER</text>
    <text x="30" y="40" fill="rgba(184,145,255,0.3)" font-size="6">✦</text>
    <text x="310" y="60" fill="rgba(184,145,255,0.2)" font-size="5">✦</text>
  </svg>`;
}

function numerologySVG(number) {
  const colors = {'1':'#c9a84c','2':'#b891ff','3':'#ff91b8','4':'#4a9eff','5':'#ff6b6b','6':'#80ff80','7':'#8b45ff','8':'#e8a840','9':'#ff91b8','11':'#b891ff','22':'#c9a84c','33':'#ff91b8'};
  const color = colors[String(number)] || '#b891ff';
  return `<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" style="max-width:260px">
    <rect width="300" height="300" fill="#05071a"/>
    <!-- Outer rings -->
    <circle cx="150" cy="150" r="130" fill="none" stroke="${color}" stroke-opacity="0.06" stroke-width="1"/>
    <circle cx="150" cy="150" r="110" fill="none" stroke="${color}" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="150" cy="150" r="90"  fill="none" stroke="${color}" stroke-opacity="0.1"  stroke-width="1"/>
    <!-- Dots on outer ring -->
    ${Array.from({length:9},(_,i)=>{const a=i*40*(Math.PI/180);const x=150+110*Math.cos(a);const y=150+110*Math.sin(a);return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${color}" fill-opacity="0.25"/>`}).join('')}
    <!-- Glow -->
    <circle cx="150" cy="150" r="65" fill="${color}" fill-opacity="0.04"/>
    <circle cx="150" cy="150" r="50" fill="${color}" fill-opacity="0.07"/>
    <!-- Number -->
    <text x="150" y="165" text-anchor="middle" fill="${color}" font-size="72" font-family="serif" opacity="0.9">${number}</text>
    <text x="150" y="220" text-anchor="middle" fill="${color}" font-size="8" font-family="serif" letter-spacing="5" opacity="0.35">LIFE PATH</text>
  </svg>`;
}

// Parse report into sections
function parseReport(text) {
  const sections = [];
  const lines = text.split('\n');
  let current = null;

  lines.forEach(line => {
    const match = line.match(/^##\s+(.+)$/);
    if (match) {
      if (current) sections.push(current);
      current = { title: match[1].trim(), body: '' };
    } else if (current) {
      current.body += line + '\n';
    }
  });
  if (current) sections.push(current);
  return sections;
}

// Extract Life Path number from report text
function extractLifePathNumber(text) {
  const match = text.match(/Life Path (?:number )?(?:is |:?\s*)([1-9]|11|22|33)\b/i);
  return match ? match[1] : '7';
}

function renderReport(data) {
  const { report, tier, createdAt } = data;
  const sections = parseReport(report);
  const lifePathNum = extractLifePathNumber(report);
  const date = createdAt ? new Date(createdAt).toLocaleDateString('en-IE', {year:'numeric',month:'long',day:'numeric'}) : '';

  // Map section titles to diagrams
  const diagramMap = {
    'SATURN': saturnSVG(),
    'JUPITER': jupiterSVG(),
    'LIFE PATH': numerologySVG(lifePathNum),
  };

  let html = `
    <div class="cover">
      <div class="cover-logo">✦ MYCOSMICFATE</div>
      <div class="cover-orb">✦</div>
      <h1 class="cover-title">Your Cosmic Fate Reading</h1>
      <p class="cover-sub">A personal reading written for you alone, by the light of your birth chart and the numbers that carry your name.</p>
      <div class="cover-date">${date ? 'PREPARED ' + date.toUpperCase() : ''}</div>
    </div>

    <div class="planet-diagram">
      ${birthChartSVG()}
      <p class="diagram-caption">Your natal chart — the sky at your moment of arrival</p>
    </div>
    <div class="section-divider"></div>`;

  sections.forEach((s, i) => {
    const titleUpper = s.title.toUpperCase();
    const diagKey = Object.keys(diagramMap).find(k => titleUpper.includes(k));
    const diagram = diagKey ? diagramMap[diagKey] : null;

    // Split number from title
    const titleClean = s.title.replace(/^SECTION \d+:\s*/i, '');
    const sectionNum = s.title.match(/SECTION (\d+)/i)?.[1];

    // Format body — paragraphs
    const bodyFormatted = s.body.trim().split('\n\n')
      .filter(p => p.trim())
      .map(p => `<p>${p.trim().replace(/\n/g,' ')}</p>`)
      .join('');

    // Put last paragraph in highlight box if it's the closing thought
    const paras = s.body.trim().split('\n\n').filter(p => p.trim());
    const lastPara = paras[paras.length - 1] || '';
    const bodyWithoutLast = paras.slice(0, -1).map(p => `<p>${p.trim().replace(/\n/g,' ')}</p>`).join('');
    const useHighlight = paras.length > 2 && lastPara.length < 300;

    html += `
      <div class="section">
        ${sectionNum ? `<div class="section-number">SECTION ${sectionNum}</div>` : ''}
        <h2 class="section-title">${titleClean}</h2>
        <div class="section-rule"></div>
        ${diagram ? `<div class="planet-diagram">${diagram}<p class="diagram-caption">${titleClean.toLowerCase()}</p></div>` : ''}
        <div class="section-body">
          ${useHighlight ? bodyWithoutLast + `<div class="highlight-box"><p>${lastPara.trim()}</p></div>` : bodyFormatted}
        </div>
      </div>
      ${i < sections.length - 1 ? '<div class="section-divider"></div>' : ''}`;
  });

  html += `
    <div class="closing">
      <div class="cover-orb" style="width:60px;height:60px;font-size:1.2rem;margin-bottom:24px;">✦</div>
      <p class="closing-logo">MYCOSMICFATE · YOUR READING ENDS HERE<br>BUT YOUR STORY DOES NOT</p>
    </div>`;

  document.getElementById('report').innerHTML = html;
  document.getElementById('report').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('download-bar').style.display = 'block';
}

async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.querySelector('.loading-sub').textContent = 'No report ID found. Please check your email link.';
    return;
  }
  try {
    const res = await fetch('/api/get-report?id=' + id);
    if (!res.ok) throw new Error('Not found');
    const data = await res.json();
    renderReport(data);
  } catch(err) {
    document.querySelector('.loading-sub').textContent = 'Report not found. Please check your link or email hello@mycosmicfate.com';
  }
}

loadReport();
</script>
</body>
</html>
