<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading on its way — MyCosmicFate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05071a;color:#f0eaff;font-family:'Cormorant Garamond',serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.wrap{max-width:420px;}
.orb{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#9b6dff,#4a1a8a 50%,#0d0520 80%);box-shadow:0 0 60px rgba(155,109,255,0.5);margin:0 auto 32px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 60px rgba(155,109,255,0.5)}50%{box-shadow:0 0 100px rgba(155,109,255,0.8)}}
h1{font-family:'Cinzel',serif;font-size:1.4rem;color:#f0eaff;margin-bottom:12px;letter-spacing:1px;}
p{font-style:italic;font-size:1rem;color:rgba(200,180,255,0.55);line-height:1.8;margin-bottom:28px;}
a{font-family:'Cinzel',serif;font-size:0.72rem;color:rgba(184,145,255,0.35);letter-spacing:3px;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb">✦</div>
  <h1>Your reading is on its way</h1>
  <p>Check your inbox in the next few minutes. The stars have spoken.</p>
  <a href="/">← mycosmicfate.com</a>
</div>
</body>
</html>
